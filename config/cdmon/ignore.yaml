---
# Frontmatter (REQUIRED): provenance.
cdmon-config-version: "2.0.0"
source: ".gitignore + manual"
updated: "2026-06-07"
---
# Body: the effective ignore set = patterns ∪ (.gitignore globs when gitignore:
# true). A file matching the ignore set is removed from the coverage universe —
# it is never reported as "uncovered". These mirror the root cdmon.yaml's
# coverage.exclude; gitignore:true additionally folds in the repo .gitignore
# (build/dist/dashboard/etc., none of which carry engine .py source).

gitignore: true
patterns:
  - "**/.*/**"
  - "**/__pycache__/**"
  - "**/.venv/**"
